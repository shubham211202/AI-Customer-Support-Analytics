version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: support_analytics_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support_analytics
    # Port 5433 mapped on host to avoid port conflict if host has a local Postgres on 5432.
    # Inside the docker network, it still uses 5432.
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d support_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: support_analytics_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/support_analytics
      - MLFLOW_TRACKING_URI=http://localhost:5000
      - APP_ENV=docker
      - APP_NAME=AI-Powered Customer Support Analytics Platform
      - MODEL_VERSION=production
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    volumes:
      - app_logs:/app/logs
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: support_analytics_frontend
    restart: always
    depends_on:
      - backend

  nginx-gateway:
    image: nginx:1.25-alpine
    container_name: support_analytics_nginx_gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./monitoring/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./monitoring/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: support_analytics_mlflow
    restart: always
    ports:
      - "5000:5000"
    environment:
      - BACKEND_STORE_URI=sqlite:///mlflow.db
      - DEFAULT_ARTIFACT_ROOT=file:///mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --artifacts-destination file:///mlflow/artifacts --serve-artifacts

  airflow:
    image: apache/airflow:2.8.1-python3.10
    container_name: support_analytics_airflow
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/config:/opt/airflow/config
      - ./airflow/data:/opt/airflow/data
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_started
    command: >
      bash -c "pip install --user mlflow==2.11.3 scikit-learn \"email-validator>=2.0.0\" &&
               airflow db migrate &&
               airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin &&
               (airflow webserver & airflow scheduler)"

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: support_analytics_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend

  loki:
    image: grafana/loki:2.9.0
    container_name: support_analytics_loki
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.9.0
    container_name: support_analytics_promtail
    restart: always
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - app_logs:/logs:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.2.0
    container_name: support_analytics_grafana
    restart: always
    ports:
      - "3010:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data:
  mlflow_data:
  app_logs:
